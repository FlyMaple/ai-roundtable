<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI 圓桌 - Multi-AI Roundtable</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-main">
        <h1>AI 圓桌</h1>
        <div class="header-actions">
          <button id="mode-normal" class="mode-btn active">普通</button>
          <button id="mode-discussion" class="mode-btn">討論</button>
          <button id="settings-btn" class="icon-btn" title="設定">⚙️</button>
        </div>
      </div>
      
      <!-- 設定彈窗 -->
      <div id="settings-panel" class="settings-panel hidden">
        <h3>載入設定</h3>
        <div class="setting-item">
          <label><input type="checkbox" id="load-chatgpt" checked> ChatGPT</label>
        </div>
        <div class="setting-item">
          <label><input type="checkbox" id="load-gemini" checked> Gemini</label>
        </div>
        <div class="setting-item">
          <label><input type="checkbox" id="load-claude"> Claude</label>
        </div>
        <button id="save-settings-btn" class="primary-btn">儲存並重整</button>
      </div>

      <div class="tab-status">
        <div id="ai-selector-chatgpt" class="ai-status-item">
          <input type="checkbox" id="target-chatgpt" checked>
          <label for="target-chatgpt">ChatGPT</label>
          <span id="status-chatgpt" class="status disconnected"></span>
        </div>
        <div id="ai-selector-claude" class="ai-status-item hidden">
          <input type="checkbox" id="target-claude">
          <label for="target-claude">Claude</label>
          <span id="status-claude" class="status disconnected"></span>
        </div>
        <div id="ai-selector-gemini" class="ai-status-item">
          <input type="checkbox" id="target-gemini" checked>
          <label for="target-gemini">Gemini</label>
          <span id="status-gemini" class="status disconnected"></span>
        </div>
      </div>
    </header>

    <main id="normal-mode">
      <div class="log-header" style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:600;">活動日誌</span>
        <button id="clear-log-btn" class="icon-btn" title="清除日誌" style="font-size:12px; padding:2px 4px;">🗑️</button>
      </div>
      <div id="log-container" class="log-container">
        <div class="log-placeholder">等待傳送訊息...</div>
      </div>

      <div class="input-area">
        <div id="file-list" class="file-list"></div>
        <div class="toolbar">
          <div class="tool-group">
            <button class="shortcut-btn" data-insert="/mutual">/mutual</button>
            <button class="shortcut-btn" data-insert="/cross ">/cross</button>
            <select id="action-select">
              <option value="">動作...</option>
              <option value="evaluate">評價一下</option>
              <option value="learn">值得借鏡</option>
              <option value="critique">指出問題</option>
              <option value="supplement">補充遺漏</option>
              <option value="compare">對比觀點</option>
            </select>
          </div>
          <div class="tool-group">
            <button class="mention-btn" data-mention="@ChatGPT">@ChatGPT</button>
            <button id="mention-claude-btn" class="mention-btn hidden" data-mention="@Claude">@Claude</button>
            <button class="mention-btn" data-mention="@Gemini">@Gemini</button>
          </div>
        </div>
        <div class="textarea-wrapper">
          <textarea id="message-input" placeholder="輸入訊息... (@AI 提及, /cross 交叉引用)"></textarea>
          <div class="input-actions">
            <button id="add-file-btn" class="icon-btn hidden" title="上傳檔案">📎</button>
            <input type="file" id="file-input" multiple style="display: none;">
            <button id="send-btn" class="send-btn">傳送</button>
            <button id="new-chat-btn" class="icon-btn" title="新對話 (Ctrl+Shift+O)" style="font-size:16px;">✨</button>
          </div>
        </div>
      </div>
    </main>

    <div id="discussion-mode" class="hidden">
      <!-- 討論設定 -->
      <div id="discussion-setup" class="discussion-setup">
        <h3>啟動討論</h3>
        <div class="field">
          <label>討論主題</label>
          <textarea id="discussion-topic" placeholder="例如：分析量子運算的未來發展..."></textarea>
        </div>
        <div class="field">
          <label>參與者 (選擇 2 位)</label>
          <div class="participant-selection">
            <div id="participant-chatgpt-wrapper">
              <label><input type="checkbox" name="participant" value="chatgpt"> ChatGPT</label>
            </div>
            <div id="participant-claude-wrapper" class="hidden">
              <label><input type="checkbox" name="participant" value="claude"> Claude</label>
            </div>
            <div id="participant-gemini-wrapper">
              <label><input type="checkbox" name="participant" value="gemini"> Gemini</label>
            </div>
          </div>
        </div>
        <button id="start-discussion-btn" class="primary-btn" disabled>開始討論</button>
      </div>

      <!-- 進行中討論 -->
      <div id="discussion-active" class="discussion-active hidden">
        <div class="discussion-header">
          <div class="badges">
            <span id="round-badge" class="badge">第 1 輪</span>
            <span id="participants-badge" class="badge">AI vs AI</span>
          </div>
          <div id="topic-display" class="topic-display"></div>
        </div>
        
        <div id="discussion-status" class="discussion-status">等待中...</div>
        
        <div class="discussion-controls">
          <button id="next-round-btn" class="primary-btn" disabled>下一輪 (交叉評價)</button>
          <button id="generate-summary-btn" class="secondary-btn" disabled>生成總結</button>
          <button id="end-discussion-btn" class="danger-btn">結束討論</button>
        </div>

        <div class="interject-area">
          <input type="text" id="interject-input" placeholder="輸入意見引導討論...">
          <button id="interject-btn" class="primary-btn">插話</button>
        </div>
      </div>

      <!-- 討論總結 -->
      <div id="discussion-summary" class="discussion-summary hidden">
        <div class="summary-header">
          <h3>討論總結</h3>
          <button id="new-discussion-btn" class="primary-btn">新討論</button>
        </div>
        <div id="summary-content" class="summary-content"></div>
      </div>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
